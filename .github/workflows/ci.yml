name: ci

on:
  push:
    branches:
      - main
      - feat-*
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build XcaNet.sln
      - name: Test
        run: dotnet test XcaNet.sln --no-build

  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish release package
        shell: bash
        run: packaging/package-app.sh "${{ matrix.rid }}" Release artifacts
      - name: Verify publish layout
        shell: bash
        run: packaging/verify-layout.sh "${{ matrix.rid }}" Release artifacts
